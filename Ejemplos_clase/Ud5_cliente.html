<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ud5_Cliente</title>
    <link rel="stylesheet" href="styles_ud5.css">
</head>
<body>
    <div class="form-container">
     <form id='contact-form' novalidate>
            <h2>Formulario de contacto</h2>

                <label for="name">Nombre:</label>
                <input type="text" id="name" name="name" placeholder="Tu nombre" required>
                <small class="error" id="error-name"></small>

                <label for="email">Correo electronico:</label>
                <input type="email" name="email" id="email" placeholder="Tu email:" required>
                <small class="error" id="error-email"></small>

                <label for="phone">Teléfono:</label>
                <input type="tel" id="phone" name="phone" placeholder="+34 600-123-456" required>
                <small class="error" id="error-phone"></small>

                <label for="password">Contraseña:</label>
                <input name="password" id="password" placeholder="Ingresa tu contraseña" required>
                <small class="error" id="error-password"></small>

                <button type="submit">Enviar</button>
                <div id="mensaje" style="margin-top: 20px; padding: 10px; display: none;"></div>
        </form>

    </div><br>


    <script>
    const formulario = document.getElementById('contact-form');
    formulario.addEventListener('submit', function(evento){
    evento.preventDefault();

    const regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const regexNombre = /^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$/;
    const regexPassword = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&._-])[A-Za-z\d@$!%*?&._-]{8,}$/;
    const regexPhone = /^\+\d{2} \d{3}-\d{3}-\d{3}$/;

    let valido = true;

    const nombre = formulario.elements['name'];
    const correo = formulario.elements['email'];
    const telefono = formulario.elements['phone'];
    const contraseña = formulario.elements['password'];

    limpiarErrores();

    // Nombre
    if(!regexNombre.test(nombre.value.trim())){
        mostrarError(nombre, "Solo letras y espacios", "error-name");
        valido = false;
    }

    // Email
    if(!regexEmail.test(correo.value.trim())){
        mostrarError(correo, "Correo no válido", "error-email");
        valido = false;
    }

    // Teléfono
    if(!regexPhone.test(telefono.value.trim())){
        mostrarError(telefono, "Formato: +34 600-123-456", "error-phone");
        valido = false;
    }

    // Contraseña
    if(!regexPassword.test(contraseña.value)){
        mostrarError(contraseña, "Mínimo 8 caracteres con mayúscula, minúscula, número y símbolo", "error-password");
        valido = false;
    }
    const contenedorMensaje = document.getElementById('mensaje');
    if(valido){
        //alert("Formulario enviado correctamente");
        contenedorMensaje.textContent='Formulario enviado con éxito';
        contenedorMensaje.style.display = 'block'; // Lo hacemos visible
        contenedorMensaje.style.color = 'green';
        contenedorMensaje.style.border = '2px solid green';
        formulario.submit();
    }
    });

    // Mostrar error
    function mostrarError(input, mensaje, idError){
        const errorSpan = document.getElementById(idError);
            if(errorSpan) {
                errorSpan.textContent = mensaje;
            }
            input.classList.add("input-error");
    }

    // Limpiar errores
    function limpiarErrores(){
        document.querySelectorAll(".error").forEach(e => e.textContent = "");
        document.querySelectorAll("input").forEach(i => i.classList.remove("input-error"));
    }
    const campos=document.querySelectorAll('input');
    campos.forEach(campo=> {
            campo.addEventListener('focus',function(){
                this.style.border='2px solid blue';
            });
            campo.addEventListener('blur',function(){
                if(this.value===''){
                    this.style.border='2px solid red';
                }else{
                    this.style.border='2px solid green'
                }
            });
    });
    </script>
</body>
</html>
